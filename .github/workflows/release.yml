name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: bun install

      - name: Build Vite
        env:
          VITE_ANTHROPIC_API_KEY: ${{ secrets.VITE_ANTHROPIC_API_KEY }}
        run: bun run build

      - name: Inject update token
        env:
          GH_UPDATE_TOKEN: ${{ secrets.GH_UPDATE_TOKEN }}
        run: bun scripts/inject-update-token.mjs

      - name: Package installer
        run: bunx electron-builder --publish never

      - name: Publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          # Create release (ok if already exists from a re-run)
          gh release create "$TAG" --title "$TAG" --generate-notes || true
          # Upload every artifact individually — --clobber overwrites if already there
          for f in release/*.exe release/*.blockmap release/latest.yml; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --clobber && echo "Uploaded $f"
          done
          # Verify latest.yml made it — auto-updater won't work without it
          gh release view "$TAG" --json assets --jq '.assets[].name' | grep -q 'latest.yml' \
            && echo "latest.yml confirmed in release" \
            || { echo "ERROR: latest.yml missing from release — auto-updater will not work"; exit 1; }
