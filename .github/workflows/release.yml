name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: bun install

      - name: Build Vite
        run: bun run build

      - name: Package and publish installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bunx electron-builder --publish always
